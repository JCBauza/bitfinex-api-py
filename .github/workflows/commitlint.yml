name: Commit Lint
on:
  pull_request:
    branches: [main, master]
permissions:
  contents: read
jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Lint commits in PR
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: ".commitlintrc.json"
          failOnWarnings: false
          firstParent: false

